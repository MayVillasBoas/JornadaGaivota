<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Explorer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#1a1a2e;--card-hover:#222244;--text:#e0e0e0;--text-dim:#888;--accent:#f4a261;--accent2:#e76f51;--border:#2a2a3e;--rel:#e74c3c;--career:#3498db;--identity:#9b59b6;--grief:#7f8c8d;--health:#2ecc71;--geo:#f39c12;--fin:#1abc9c;--purpose:#e67e22}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#1a1a2e}
::-webkit-scrollbar-thumb{background:#444;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#666}
.app{display:flex;flex-direction:column;height:100vh}
.header{padding:12px 24px;background:#0a0a1a;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-shrink:0;position:relative;z-index:10}
.header h1{font-size:18px;font-weight:600;color:var(--accent)}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-dim);background:transparent;border:1px solid transparent;transition:all .2s}
.tab:hover{color:var(--text);background:#1a1a2e}
.tab.active{color:var(--accent);background:#1a1a2e;border-color:var(--accent)}
.content{flex:1;overflow:hidden;position:relative}
.tab-panel{position:absolute;inset:0;overflow-y:auto;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
.tab-panel.active{opacity:1;pointer-events:all}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:all .2s;cursor:pointer}
.card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 4px 20px rgba(244,162,97,.1)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;background:#2a2a3e;color:var(--text-dim);margin:2px}
/* Discovery */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;flex:1;min-width:120px;text-align:center}
.stat-box .num{font-size:28px;font-weight:700;color:var(--accent)}
.stat-box .lbl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-pill{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .2s}
.filter-pill:hover,.filter-pill.active{background:var(--accent);color:#000;border-color:var(--accent)}
.search-box{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:#111;color:var(--text);font-size:13px;width:200px}
.search-box:focus{outline:none;border-color:var(--accent)}
.insight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px}
.insight-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .3s;overflow:hidden}
.insight-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.insight-card.expanded{grid-column:1/-1;cursor:default}
.insight-card .cat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.insight-card h3{font-size:15px;margin-bottom:8px;color:#fff}
.insight-card .preview{font-size:13px;color:var(--text-dim);line-height:1.5}
.insight-card .full-content{display:none;font-size:13px;line-height:1.7;color:var(--text);margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.insight-card.expanded .full-content{display:block}
.insight-card.expanded .preview{display:none}
.insight-callout{background:#1e1e38;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px;margin:10px 0;font-size:12px;line-height:1.5}
.insight-callout h4{color:var(--accent);font-size:12px;margin-bottom:4px}
.category-header{font-size:16px;font-weight:600;color:var(--accent);margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* Constellation */
#constellation-container{position:relative;width:100%;height:100%}
#constellation-svg{width:100%;height:100%}
.constellation-controls{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:8px;z-index:10}
.constellation-controls label{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.constellation-controls input[type=checkbox]{accent-color:var(--accent)}
.constellation-controls input[type=range]{width:120px;accent-color:var(--accent)}
.zoom-controls{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:4px;z-index:10}
.zoom-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{background:var(--accent);color:#000}
.constellation-search{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:10}
.node-detail{position:absolute;bottom:0;left:0;right:0;background:#0a0a1a;border-top:2px solid var(--accent);padding:16px 20px;max-height:40%;overflow-y:auto;display:none;z-index:10}
.node-detail.show{display:block}
.node-detail h3{color:var(--accent);margin-bottom:8px}
.node-detail .connections{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
/* Timeline */
#timeline-panel{overflow:hidden;display:flex;flex-direction:column}
#timeline-svg-container{flex:1;overflow-x:auto;overflow-y:hidden;position:relative}
.timeline-detail{position:absolute;right:0;top:0;bottom:0;width:340px;background:#0a0a1a;border-left:2px solid var(--accent);padding:16px;overflow-y:auto;display:none;z-index:10}
.timeline-detail.show{display:block}
.timeline-detail h3{color:var(--accent);margin-bottom:8px;font-size:14px}
.timeline-detail .quote{border-left:3px solid var(--accent);padding:8px 12px;margin:8px 0;font-size:12px;color:var(--text-dim);font-style:italic}
/* Dashboard */
#dashboard-panel{display:grid;grid-template-columns:250px 1fr 320px;grid-template-rows:1fr 50px;height:100%;overflow:hidden;padding:0}
#dashboard-panel.active{padding:0}
.dash-left{background:#0a0a1a;border-right:1px solid var(--border);overflow-y:auto;padding:12px;grid-row:1/3}
.dash-center{overflow-y:auto;padding:16px;grid-row:1/2}
.dash-right{background:#0a0a1a;border-left:1px solid var(--border);overflow-y:auto;padding:12px;grid-row:1/3}
.dash-bottom{grid-column:2;padding:8px 16px;background:#0a0a1a;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
.theme-tree-item{padding:6px 8px;cursor:pointer;border-radius:6px;font-size:13px;display:flex;align-items:center;gap:8px;transition:background .2s}
.theme-tree-item:hover{background:#1a1a2e}
.theme-tree-item.active{background:var(--card);border:1px solid var(--accent)}
.theme-tree-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.theme-tree-item .count{margin-left:auto;font-size:11px;color:var(--text-dim);background:#1a1a2e;padding:1px 6px;border-radius:8px}
.theme-tree-cat{padding:8px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:6px;margin-top:8px}
.theme-tree-cat .arrow{transition:transform .2s;font-size:10px}
.theme-tree-cat.collapsed .arrow{transform:rotate(-90deg)}
.theme-tree-children{overflow:hidden;transition:max-height .3s}
.theme-tree-cat.collapsed+.theme-tree-children{max-height:0!important}
.dash-insight{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;font-size:12px;line-height:1.5}
.dash-insight h4{color:var(--accent);font-size:12px;margin-bottom:6px}
.breadcrumb{font-size:12px;color:var(--text-dim);margin-bottom:12px}
.breadcrumb span{color:var(--accent)}
.event-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.event-card .date{font-size:11px;color:var(--accent)}
.event-card .summary{font-size:13px;color:var(--text);margin:6px 0;line-height:1.5}
.event-card .quote-block{border-left:3px solid var(--accent);padding:6px 10px;margin:8px 0;font-size:12px;color:var(--text-dim);font-style:italic;line-height:1.4}
/* Frameworks */
.fw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.fw-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;border-left:4px solid}
.fw-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.fw-card .num{font-size:32px;font-weight:700;color:var(--accent)}
.fw-card h3{font-size:15px;margin:4px 0}
.fw-card .book{font-size:12px;color:var(--text-dim)}
.fw-expanded{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.fw-card.expanded .fw-expanded{display:block}
.fw-card.expanded{grid-column:1/-1}
.principle-item{padding:8px;border-radius:6px;background:#111;margin:6px 0}
.principle-item h4{font-size:13px;color:#fff;margin-bottom:4px}
.principle-item .desc{font-size:12px;color:var(--text-dim);line-height:1.4}
.progress-bar{height:4px;background:#222;border-radius:2px;margin-top:6px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--accent);border-radius:2px}
.overlap-section{margin-top:20px;padding:16px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.overlap-section h3{color:var(--accent);margin-bottom:12px}
.overlap-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.overlap-item:last-child{border:none}
.overlap-item .theme-name{font-size:13px;min-width:120px;color:#fff}
.overlap-pills{display:flex;flex-wrap:wrap;gap:4px}

#journal-panel{display:grid;grid-template-columns:60% 40%;height:100%;overflow:hidden;padding:0}
.journal-left{padding:16px;display:flex;flex-direction:column}
.journal-left textarea{flex:1;background:#111;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:16px;resize:none;font-family:inherit;line-height:1.6}

.journal-right{background:#0a0a1a;border-left:1px solid var(--border);padding:16px;overflow-y:auto}
.journal-right h4{color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px}
.add-btn{padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.add-btn:hover{background:var(--accent2)}
.saved-reflections{margin-top:16px}
.saved-ref{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;font-size:12px}
.saved-ref .ref-date{color:var(--text-dim);font-size:10px}
.saved-ref .ref-text{margin-top:4px;line-height:1.4}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stagger{animation:fadeInUp .3s ease both}
</style>
</head>

  "patterns": [
    {
      "id": "perfectionism_paralysis",
      "name": "Perfectionism as Paralysis",
      "description": "Uses the need for perfection as a reason to delay decisions and avoid risk. Shows up in career choices, creative projects, and relationship milestones — if it can't be done perfectly, it shouldn't be started.",
      "frameworks": [
        "harris.mindfulness",
        "ferriss.fear_setting"
      ]
    },
    {
      "id": "exercise_as_escape",
      "name": "Exercise as Emotional Escape",
      "description": "Channels difficult emotions into intense physical training rather than processing them. Running becomes a way to outpace grief, anxiety, and loneliness instead of sitting with them.",
      "frameworks": [
        "huberman.dopamine_regulation",
        "tift.emotional_processing"
      ]
    },
    {
      "id": "geographical_cure",
      "name": "The Geographical Cure",
      "description": "Believes that moving to a new city or country will resolve internal conflicts. Each relocation carries the hope that a change in scenery equals a change in self.",
      "frameworks": [
        "sivers.revolution",
        "harris.values_clarification"
      ]
    },
    {
      "id": "creative_suppression",
      "name": "Creative Suppression for Stability",
      "description": "Buries creative desires and design instincts in favor of the perceived safety of a corporate product career. Treats artistic impulses as impractical rather than essential.",
      "frameworks": [
        "sivers.hell_yeah_or_no",
        "tift.deep_feelings"
      ]
    },
    {
      "id": "caretaker_identity",
      "name": "Caretaker Identity",
      "description": "Defines self-worth through helping and caring for others — mother, partner, friends — while systematically neglecting her own emotional needs. Exhaustion becomes proof of value.",
      "frameworks": [
        "harris.acceptance",
        "tift.emotional_processing"
      ]
    },
    {
      "id": "comparison_spiral",
      "name": "Comparison Spiral",
      "description": "Compulsively measures career progress, creative output, and life milestones against peers. Each comparison reinforces the feeling of being behind, fueling anxiety and perfectionism.",
      "frameworks": [
        "ferriss.80_20",
        "sivers.useful_not_true"
      ]
    },
    {
      "id": "avoidant_attachment",
      "name": "Avoidant Attachment Pattern",
      "description": "Pulls away emotionally when relationships become intimate or demanding. Interprets closeness as a threat to independence. The pattern appears in romantic relationships, friendships, and even with her therapist.",
      "frameworks": [
        "harris.acceptance",
        "tift.emotional_processing"
      ]
    },
    {
      "id": "oscillation_stay_vs_go",
      "name": "Stay vs. Go Oscillation",
      "description": "Chronic indecision between staying in what's stable and comfortable versus leaving for what promises growth but demands risk. The oscillation itself becomes a way to avoid committing to either path.",
      "frameworks": [
        "sivers.hell_yeah_or_no",
        "ferriss.fear_setting"
      ]
    }
  ],

const INSIGHT_CATEGORIES = {
  'Self-Knowledge':['top_themes','strengths','core_values','strengths_unseen'],
  'Patterns':['recurring_patterns','repetitive_thought_loops','body_relationship_link','attachment_style_evidence'],
  'Correlations':['relationship_career_correlation','body_relationship_link','geographic_emotional_map','energy_patterns','social_connection_map'],
  'Growth':['growth_evidence','theme_evolution'],
  'Framework Analysis':['tift_analysis','framework_convergence','risk_assessment','values_actions_alignment'],
  'People':['key_people','social_connection_map'],
  'Blind Spots':['blind_spots','financial_anxiety_vs_reality','independence_paradox'],
  'Decisions':['decision_patterns','unlived_life_inventory','trigger_mapping'],
  'Therapy':['therapist_pattern_recognition','season_of_grief','attachment_style_evidence']
};
const CAT_COLORS={'Self-Knowledge':'#3498db','Patterns':'#e74c3c','Correlations':'#9b59b6','Growth':'#2ecc71','Framework Analysis':'#f39c12','People':'#4ecdc4','Blind Spots':'#e67e22','Decisions':'#1abc9c','Therapy':'#7f8c8d'};

function getInsightCategory(insight){
  for(const[cat,ids]of Object.entries(INSIGHT_CATEGORIES)){
    if(ids.includes(insight.id))return cat;
  }
  return 'Self-Knowledge';
}

function getRelatedInsights(keywords){
  if(!keywords||!keywords.length)return[];
  const kw=keywords.map(k=>k.toLowerCase());
  return DATA.insights.filter(ins=>{
    const txt=(ins.title+' '+ins.content+(ins.id||'')).toLowerCase();
    return kw.some(k=>txt.includes(k));
  });
}

function getEventById(id){return DATA.events.find(e=>e.id===id)}
function truncate(s,n){return s&&s.length>n?s.substring(0,n)+'...':s||''}
function fmtDate(d){if(!d)return'No date';const p=d.split('-');return`${p[2]}/${p[1]}/${p[0]}`}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ===== TAB SWITCHING =====
let currentTab='discovery';
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const tab=t.dataset.tab;
    document.getElementById(tab+'-panel').classList.add('active');
    if(tab!==currentTab){currentTab=tab;initTab(tab)}
  });
});
const initializedTabs={};
function initTab(tab){
  if(initializedTabs[tab])return;
  initializedTabs[tab]=true;
  switch(tab){
    case'discovery':renderDiscovery();break;
    case'constellation':renderConstellation();break;
    case'timeline':renderTimeline();break;
    case'dashboard':renderDashboard();break;
    case'frameworks':renderFrameworks();break;
    case'journal':renderJournal();break;
  }
}

function renderDiscovery(){
  const p=document.getElementById('discovery-panel');
  const patternCount=DATA.patterns.length;
  const peopleCount=DATA.people.length;
  const fwCount=Object.keys(DATA.frameworks).length;
  let html=`
  <div class="stats-row">
    <div class="stat-box"><div class="num">${DATA.insights.length}</div><div class="lbl">Insights</div></div>
    <div class="stat-box"><div class="num">${DATA.events.length}</div><div class="lbl">Sessions</div></div>
    <div class="stat-box"><div class="num">${peopleCount}</div><div class="lbl">People</div></div>
    <div class="stat-box"><div class="num">${fwCount}</div><div class="lbl">Frameworks</div></div>
    <div class="stat-box"><div class="num">${patternCount}</div><div class="lbl">Patterns</div></div>
  </div>
  <div class="filter-row">
    <div class="filter-pill active" data-cat="All">All</div>
    ${Object.keys(INSIGHT_CATEGORIES).map(c=>`<div class="filter-pill" data-cat="${c}">${c}</div>`).join('')}
    <input class="search-box" placeholder="Search insights..." id="insight-search">
  </div>
  <div class="insight-grid" id="insight-grid"></div>`;
  p.innerHTML=html;
  renderInsightGrid('All','');
  p.querySelectorAll('.filter-pill').forEach(fp=>{
    fp.addEventListener('click',()=>{
      p.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));
      fp.classList.add('active');
      renderInsightGrid(fp.dataset.cat,document.getElementById('insight-search').value);
    });
  });
  document.getElementById('insight-search').addEventListener('input',e=>{
    const activeCat=p.querySelector('.filter-pill.active').dataset.cat;
    renderInsightGrid(activeCat,e.target.value);
  });
}

function renderInsightGrid(cat,search){
  const grid=document.getElementById('insight-grid');
  let insights=DATA.insights;
  if(cat!=='All'){
    const ids=INSIGHT_CATEGORIES[cat]||[];
    insights=insights.filter(i=>ids.includes(i.id));
  }
  if(search){
    const s=search.toLowerCase();
    insights=insights.filter(i=>(i.title+i.content).toLowerCase().includes(s));
  }
  // Group by category
  const grouped={};
  insights.forEach(ins=>{
    const c=getInsightCategory(ins);
    if(!grouped[c])grouped[c]=[];
    grouped[c].push(ins);
  });
  let html='';
  for(const[catName,items]of Object.entries(grouped)){
    if(cat==='All')html+=`<div class="category-header" style="grid-column:1/-1">${catName}</div>`;
    items.forEach((ins,i)=>{
      const color=CAT_COLORS[catName]||'#f4a261';
      const fws=(ins.frameworks||[]).map(f=>{
        const parts=f.split('.');
        const fw=DATA.frameworks[parts[0]];
        return fw?`<span class="pill">${fw.name}</span>`:'';
      }).join('');
      html+=`<div class="insight-card stagger" style="animation-delay:${i*50}ms" data-id="${ins.id}">
        <div class="cat" style="color:${color}">${catName}</div>
        <h3>${escHtml(ins.title)}</h3>
        <div class="preview">${escHtml(truncate(ins.content,200))}</div>
        <div class="full-content">${escHtml(ins.content)}<div style="margin-top:8px">${fws}</div></div>
      </div>`;
    });
  }
  grid.innerHTML=html;
  grid.querySelectorAll('.insight-card').forEach(card=>{
    card.addEventListener('click',()=>{
      if(card.classList.contains('expanded')){card.classList.remove('expanded');return}
      grid.querySelectorAll('.insight-card').forEach(c=>c.classList.remove('expanded'));
      card.classList.add('expanded');
    });
  });
}

// ===== CONSTELLATION TAB =====
function renderConstellation(){
  const container=document.getElementById('constellation-container');
  const panel=document.getElementById('constellation-panel');
  panel.style.overflow='hidden';
  panel.style.padding='0';
  container.innerHTML=`
    <div class="constellation-controls" id="const-controls">
      <label><input type="checkbox" checked data-type="theme"> Themes</label>
      <label><input type="checkbox" checked data-type="person"> People</label>
      <label><input type="checkbox" checked data-type="pattern"> Patterns</label>
      <div style="margin-top:8px;font-size:11px;color:var(--text-dim)">Min edge weight</div>
      <input type="range" min="1" max="18" value="3" id="edge-weight-slider">
      <span id="edge-weight-val" style="font-size:11px;color:var(--text-dim)">3</span>
    </div>
    <div class="constellation-search"><input class="search-box" placeholder="Search nodes..." id="node-search"></div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-out">-</button>
      <button class="zoom-btn" id="zoom-reset">R</button>
    </div>
    <svg id="constellation-svg"></svg>
    <div class="node-detail" id="node-detail"></div>`;
  
  const svg=d3.select('#constellation-svg');
  const w=container.clientWidth,h=container.clientHeight;
  svg.attr('width',w).attr('height',h);
  
  const nodes=DATA.graph.nodes.map(n=>({...n,r:Math.max(8,Math.sqrt(n.size)*3)}));
  let minWeight=3;
  let edges=DATA.graph.edges.filter(e=>e.weight>=minWeight);
  
  const nodeColors={theme:'#f4a261',person:'#4ecdc4',pattern:'#e74c3c'};
  const g=svg.append('g');
  
  const zoom=d3.zoom().scaleExtent([.2,5]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom);
  
  document.getElementById('zoom-in').onclick=()=>svg.transition().call(zoom.scaleBy,1.3);
  document.getElementById('zoom-out').onclick=()=>svg.transition().call(zoom.scaleBy,.7);
  document.getElementById('zoom-reset').onclick=()=>svg.transition().call(zoom.transform,d3.zoomIdentity);
  
  const linkG=g.append('g');
  const nodeG=g.append('g');
  const labelG=g.append('g');
  
  let linkSel,nodeSel,labelSel;
  
  const sim=d3.forceSimulation(nodes)
    .force('charge',d3.forceManyBody().strength(-1000))
    .force('center',d3.forceCenter(w/2,h/2))
    .force('collision',d3.forceCollide().radius(d=>d.r+40))
    .force('x',d3.forceX(w/2).strength(.03))
    .force('y',d3.forceY(h/2).strength(.03));
  
  function updateGraph(){
    edges=DATA.graph.edges.filter(e=>e.weight>=minWeight);
    const visibleTypes=new Set();
    container.querySelectorAll('#const-controls input[type=checkbox]:checked').forEach(cb=>visibleTypes.add(cb.dataset.type));
    const visNodes=nodes.filter(n=>visibleTypes.has(n.type));
    const visIds=new Set(visNodes.map(n=>n.id));
    const visEdges=edges.filter(e=>visIds.has(e.source.id||e.source)&&visIds.has(e.target.id||e.target));
    
    linkSel=linkG.selectAll('line').data(visEdges,d=>(d.source.id||d.source)+'-'+(d.target.id||d.target));
    linkSel.exit().remove();
    linkSel=linkSel.enter().append('line')
      .attr('stroke','#444').attr('stroke-opacity',.1).attr('stroke-width',d=>Math.max(.5,d.weight/6))
      .merge(linkSel);
    
    nodeSel=nodeG.selectAll('circle').data(visNodes,d=>d.id);
    nodeSel.exit().remove();
    nodeSel=nodeSel.enter().append('circle')
      .attr('r',d=>d.r).attr('fill',d=>nodeColors[d.type]).attr('stroke','#000').attr('stroke-width',1)
      .attr('cursor','pointer').attr('opacity',.85)
      .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
        .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
        .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
      .merge(nodeSel);
    
    nodeSel.on('mouseover',(e,d)=>{
      const connIds=new Set();
      connIds.add(d.id);
      visEdges.forEach(ed=>{
        const s=ed.source.id||ed.source,t=ed.target.id||ed.target;
        if(s===d.id)connIds.add(t);
        if(t===d.id)connIds.add(s);
      });
      nodeSel.attr('opacity',n=>connIds.has(n.id)?.95:.15);
      labelSel.attr('opacity',n=>connIds.has(n.id)?1:.1);
      linkSel.attr('stroke-opacity',ed=>{
        const s=ed.source.id||ed.source,t=ed.target.id||ed.target;
        return(s===d.id||t===d.id)?.4:.02;
      });
    }).on('mouseout',()=>{
      nodeSel.attr('opacity',.85);
      labelSel.attr('opacity',1);
      linkSel.attr('stroke-opacity',.1);
    }).on('click',(e,d)=>showNodeDetail(d));
    
    labelSel=labelG.selectAll('text').data(visNodes,d=>d.id);
    labelSel.exit().remove();
    labelSel=labelSel.enter().append('text')
      .attr('text-anchor','middle').attr('fill','#fff')
      .attr('font-size',d=>d.type==='theme'?11:d.type==='person'?10:9)
      .attr('pointer-events','none')
      .style('text-shadow','0 0 4px #000, 0 0 8px #000')
      .text(d=>d.label)
      .merge(labelSel);
    
    sim.nodes(visNodes);
    sim.force('link',d3.forceLink(visEdges).id(d=>d.id).distance(180).strength(d=>d.weight/40));
    sim.alpha(1).restart();
  }
  
  sim.on('tick',()=>{
    if(linkSel)linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    if(nodeSel)nodeSel.attr('cx',d=>d.x).attr('cy',d=>d.y);
    if(labelSel)labelSel.attr('x',d=>d.x).attr('y',d=>d.y-d.r-6);
  });
  
  updateGraph();
  
  document.getElementById('edge-weight-slider').addEventListener('input',e=>{
    minWeight=+e.target.value;
    document.getElementById('edge-weight-val').textContent=minWeight;
    updateGraph();
  });
  container.querySelectorAll('#const-controls input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change',updateGraph);
  });
  document.getElementById('node-search').addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    if(!q){nodeSel.attr('opacity',.85);labelSel.attr('opacity',1);return}
    nodeSel.attr('opacity',d=>d.label.toLowerCase().includes(q)?.95:.1);
    labelSel.attr('opacity',d=>d.label.toLowerCase().includes(q)?1:.1);
  });
  
  function showNodeDetail(d){
    const det=document.getElementById('node-detail');
    const connEdges=DATA.graph.edges.filter(e=>(e.source.id||e.source)===d.id||(e.target.id||e.target)===d.id);
    const connNodeIds=[...new Set(connEdges.map(e=>{const s=e.source.id||e.source,t=e.target.id||e.target;return s===d.id?t:s}))];
    const connNodes=connNodeIds.map(id=>DATA.graph.nodes.find(n=>n.id===id)).filter(Boolean);
    
    // Related insights
    const kws=[d.label,d.id.replace('theme_','').replace('person_','').replace('pattern_','')];
    if(d.description)kws.push(...d.description.split(' ').filter(w=>w.length>4));
    const relInsights=getRelatedInsights(kws).slice(0,5);
    
    let insightsHtml=relInsights.length?'<h4 style="color:var(--accent);margin:12px 0 6px">Related Insights</h4>'+
      relInsights.map(i=>`<div class="insight-callout"><h4>${escHtml(i.title)}</h4>${escHtml(truncate(i.content,200))}</div>`).join(''):'';
    
    det.innerHTML=`<h3>${escHtml(d.label)}</h3>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${d.type} ${d.role?'- '+d.role:''} ${d.description?'- '+escHtml(truncate(d.description,150)):''}</div>
      <h4 style="font-size:12px;margin:8px 0 4px">Connections (${connNodes.length})</h4>
      <div class="connections">${connNodes.map(n=>`<span class="pill" style="background:${nodeColors[n.type]}22;color:${nodeColors[n.type]};border:1px solid ${nodeColors[n.type]}44">${n.label}</span>`).join('')}</div>
      ${insightsHtml}`;
    det.classList.add('show');
  }
  
  svg.on('click',e=>{if(e.target===svg.node())document.getElementById('node-detail').classList.remove('show')});
}

// ===== TIMELINE TAB =====
function renderTimeline(){
  const panel=document.getElementById('timeline-panel');
  panel.style.padding='0';
  panel.style.display='flex';
  panel.style.flexDirection='column';
  
  const datedEvents=DATA.events.filter(e=>e.date).sort((a,b)=>a.date.localeCompare(b.date));
  const timelineData=DATA.timeline.filter(t=>t.date).sort((a,b)=>a.date.localeCompare(b.date));
  
  const themes=Object.keys(THEME_COLORS);
  const margin={top:40,right:40,bottom:20,left:120};
  const totalW=Math.max(900,timelineData.length*100+margin.left+margin.right);
  const bandH=40;
  const totalH=120+themes.length*bandH+margin.top+margin.bottom;
  
  panel.innerHTML=`<div id="timeline-svg-container" style="flex:1;overflow-x:auto;overflow-y:auto;position:relative">
    <svg id="timeline-svg" width="${totalW}" height="${totalH}"></svg>
    <div class="timeline-detail" id="timeline-detail"></div>
  </div>`;
  
  const svg=d3.select('#timeline-svg');
  const dates=timelineData.map(t=>new Date(t.date));
  const x=d3.scaleTime().domain(d3.extent(dates)).range([margin.left,totalW-margin.right]);
  
  // Axis
  svg.append('g').attr('transform',`translate(0,${margin.top+60})`).call(d3.axisTop(x).ticks(timelineData.length).tickFormat(d3.timeFormat('%b %y')))
    .selectAll('text').attr('fill','#888').attr('font-size',10);
  svg.selectAll('.domain,.tick line').attr('stroke','#333');
  
  // Session markers
  timelineData.forEach(t=>{
    const cx=x(new Date(t.date));
    svg.append('circle').attr('cx',cx).attr('cy',margin.top+40).attr('r',8)
      .attr('fill','var(--accent)').attr('stroke','#000').attr('stroke-width',1.5)
      .attr('cursor','pointer').attr('opacity',.8)
      .on('click',()=>showTimelineDetail(t))
      .on('mouseover',function(){d3.select(this).attr('r',12).attr('opacity',1)})
      .on('mouseout',function(){d3.select(this).attr('r',8).attr('opacity',.8)});
  });
  
  // Theme river bands
  const bandTop=margin.top+80;
  themes.forEach((theme,ti)=>{
    const y0=bandTop+ti*bandH;
    const color=THEME_COLORS[theme];
    
    // Label
    svg.append('text').attr('x',margin.left-10).attr('y',y0+bandH/2+4)
      .attr('text-anchor','end').attr('fill',color).attr('font-size',11).text(theme.charAt(0).toUpperCase()+theme.slice(1));
    
    // Compute intensity at each date
    const points=timelineData.map(t=>{
      const ev=getEventById(t.event_id);
      if(!ev||!ev.themes||!ev.themes[theme])return{x:x(new Date(t.date)),y:0};
      const total=Object.values(ev.themes[theme]).reduce((a,b)=>a+b,0);
      return{x:x(new Date(t.date)),y:Math.min(total,bandH-4)};
    });
    
    // Area
    const area=d3.area().x(d=>d.x).y0(d=>y0+bandH/2+d.y/2).y1(d=>y0+bandH/2-d.y/2).curve(d3.curveMonotoneX);
    svg.append('path').datum(points).attr('d',area).attr('fill',color).attr('opacity',.35);
    
    // Line
    const lineTop=d3.line().x(d=>d.x).y(d=>y0+bandH/2-d.y/2).curve(d3.curveMonotoneX);
    const lineBot=d3.line().x(d=>d.x).y(d=>y0+bandH/2+d.y/2).curve(d3.curveMonotoneX);
    svg.append('path').datum(points).attr('d',lineTop).attr('fill','none').attr('stroke',color).attr('stroke-width',1.5).attr('opacity',.6);
    svg.append('path').datum(points).attr('d',lineBot).attr('fill','none').attr('stroke',color).attr('stroke-width',1.5).attr('opacity',.6);
    
    // Baseline
    svg.append('line').attr('x1',margin.left).attr('x2',totalW-margin.right).attr('y1',y0+bandH/2).attr('y2',y0+bandH/2)
      .attr('stroke','#222').attr('stroke-width',.5);
  });
  
  function showTimelineDetail(t){
    const det=document.getElementById('timeline-detail');
    const ev=getEventById(t.event_id);
    const quotes=(ev?.key_quotes||[]).map(q=>`<div class="quote">${escHtml(truncate(q,250))}</div>`).join('');
    const fws=(ev?.framework_mappings||[]).map(f=>`<span class="pill">${f.principle_name}</span>`).join('');
    const themeKws=t.themes||[];
    const relInsights=getRelatedInsights(themeKws).slice(0,4);
    const insHtml=relInsights.length?'<h4 style="color:var(--accent);margin:12px 0 6px;font-size:12px">Related Insights</h4>'+
      relInsights.map(i=>`<div class="insight-callout"><h4>${escHtml(i.title)}</h4>${escHtml(truncate(i.content,180))}</div>`).join(''):'';
    
    det.innerHTML=`<h3>${fmtDate(t.date)}</h3>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">${escHtml(ev?.filename||'')}</div>
      <div style="font-size:13px;line-height:1.6;margin-bottom:12px">${escHtml(truncate(t.summary||ev?.summary||'',300))}</div>
      <div style="margin-bottom:8px">${(t.themes||[]).map(th=>`<span class="pill" style="background:${THEME_COLORS[th]||'#333'}33;color:${THEME_COLORS[th]||'#888'}">${th}</span>`).join('')}</div>
      ${quotes?'<h4 style="font-size:12px;color:var(--text-dim);margin:8px 0 4px">Key Quotes</h4>'+quotes:''}
      ${fws?'<div style="margin:8px 0">'+fws+'</div>':''}
      ${insHtml}
      <button onclick="document.getElementById('timeline-detail').classList.remove('show')" style="margin-top:12px;padding:4px 12px;background:var(--border);color:var(--text);border:none;border-radius:4px;cursor:pointer">Close</button>`;
    det.classList.add('show');
  }
}

// ===== DASHBOARD TAB =====
function renderDashboard(){
  const panel=document.getElementById('dashboard-panel');
  panel.innerHTML=`<div class="dash-left" id="dash-left"></div>
    <div class="dash-center" id="dash-center"></div>
    <div class="dash-right" id="dash-right"></div>
    <div class="dash-bottom"><span style="font-size:11px;color:var(--text-dim)">Date range:</span>
      <input type="range" min="0" max="100" value="0" id="date-range-start" style="flex:1;accent-color:var(--accent)">
      <input type="range" min="0" max="100" value="100" id="date-range-end" style="flex:1;accent-color:var(--accent)">
    </div>`;
  
  // Build theme tree
  const left=document.getElementById('dash-left');
  let treeHtml='<div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px">Themes</div>';
  for(const[themeKey,theme]of Object.entries(DATA.themes)){
    const color=THEME_COLORS[themeKey]||'#888';
    treeHtml+=`<div class="theme-tree-cat" data-theme="${themeKey}"><span class="arrow">&#9660;</span> <span class="dot" style="background:${color};display:inline-block;width:8px;height:8px;border-radius:50%"></span> ${theme.label} <span class="count" style="margin-left:auto">${theme.total_mentions}</span></div>
    <div class="theme-tree-children" style="max-height:500px">`;
    for(const[subKey,sub]of Object.entries(theme.subcategories)){
      treeHtml+=`<div class="theme-tree-item" data-theme="${themeKey}" data-sub="${subKey}"><span class="dot" style="background:${color}"></span>${sub.label}<span class="count">${sub.mentions}</span></div>`;
    }
    treeHtml+=`</div>`;
  }
  left.innerHTML=treeHtml;
  
  // Category collapse
  left.querySelectorAll('.theme-tree-cat').forEach(cat=>{
    cat.addEventListener('click',e=>{
      cat.classList.toggle('collapsed');
    });
  });
  
  // Theme item click
  left.querySelectorAll('.theme-tree-item').forEach(item=>{
    item.addEventListener('click',()=>{
      left.querySelectorAll('.theme-tree-item').forEach(x=>x.classList.remove('active'));
      item.classList.add('active');
      showThemeContent(item.dataset.theme,item.dataset.sub);
    });
  });
  
  // Initial state
  showDashWelcome();
  showDashInsights(null);
  
  function showDashWelcome(){
    const center=document.getElementById('dash-center');
    const topInsights=DATA.insights.slice(0,5);
    center.innerHTML=`<div style="text-align:center;padding:40px 0"><h2 style="color:var(--accent);margin-bottom:8px">Welcome</h2><p style="color:var(--text-dim)">Select a theme from the left panel to explore</p></div>
    <h3 style="color:var(--accent);margin:20px 0 12px">Top Insights</h3>
    ${topInsights.map(i=>`<div class="insight-callout"><h4>${escHtml(i.title)}</h4>${escHtml(truncate(i.content,200))}</div>`).join('')}`;
  }
  
  function showDashInsights(themeKey){
    const right=document.getElementById('dash-right');
    let insights=DATA.insights;
    if(themeKey){
      insights=insights.filter(ins=>{
        const txt=(ins.title+' '+ins.content+' '+(ins.id||'')).toLowerCase();
        return txt.includes(themeKey);
      });
    }
    right.innerHTML=`<div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px">Insights ${themeKey?'('+themeKey+')':''}</div>
    ${insights.map(i=>`<div class="dash-insight"><h4>${escHtml(i.title)}</h4><div>${escHtml(i.content)}</div>
    <div style="margin-top:6px">${(i.frameworks||[]).map(f=>{const parts=f.split('.');const fw=DATA.frameworks[parts[0]];return fw?`<span class="pill">${fw.name}</span>`:''}).join('')}</div></div>`).join('')}`;
  }
  
  function showThemeContent(themeKey,subKey){
    const center=document.getElementById('dash-center');
    const theme=DATA.themes[themeKey];
    const sub=theme?.subcategories[subKey];
    if(!sub)return;
    const color=THEME_COLORS[themeKey]||'#888';
    
    const eventIds=sub.events||[];
    const events=eventIds.map(getEventById).filter(Boolean);
    
    // Related insights inline
    const relInsights=getRelatedInsights([themeKey,subKey,sub.label]).slice(0,3);
    
    let html=`<div class="breadcrumb"><span>${theme.label}</span> > <span>${sub.label}</span> (${sub.mentions} mentions)</div>`;
    
    events.forEach(ev=>{
      const quotes=(ev.key_quotes||[]).slice(0,2).map(q=>`<div class="quote-block">${escHtml(truncate(q,200))}</div>`).join('');
      const fws=(ev.framework_mappings||[]).slice(0,4).map(f=>`<span class="pill">${f.principle_name}</span>`).join('');
      html+=`<div class="event-card">
        <div class="date">${fmtDate(ev.date)} - ${escHtml(ev.filename)}</div>
        <div class="summary">${escHtml(truncate(ev.summary,250))}</div>
        ${quotes}${fws?'<div style="margin-top:6px">'+fws+'</div>':''}
      </div>`;
    });
    
    // Inline insight callouts
    if(relInsights.length){
      html+=`<div style="margin-top:16px"><h3 style="color:var(--accent);margin-bottom:8px">Related Insights</h3>`;
      relInsights.forEach(i=>{
        html+=`<div class="insight-callout"><h4>${escHtml(i.title)}</h4>${escHtml(truncate(i.content,250))}</div>`;
      });
      html+=`</div>`;
    }
    
    center.innerHTML=html;
    showDashInsights(themeKey);
  }
}

// ===== FRAMEWORKS TAB =====
function renderFrameworks(){
  const panel=document.getElementById('frameworks-panel');
  const overlapData=[
    {theme:'Health',frameworks:['Attia','Huberman','Tift']},
    {theme:'Purpose',frameworks:['Harris','Schukman','Tift','Sivers']},
    {theme:'Career',frameworks:['Sivers','Ferriss']},

    {theme:'Decision Making',frameworks:['Ferriss','Sivers','Harris']}
  ];
  
  let html='<div class="fw-grid" id="fw-grid">';
  for(const[key,fw]of Object.entries(DATA.frameworks)){
    html+=`<div class="fw-card" data-fw="${key}" style="border-left-color:${fw.color}">
      <div class="num">${fw.total_connections}</div>
      <h3>${fw.name}</h3>
      <div class="book">${fw.book}</div>
      <div class="fw-expanded">`;
    for(const[pk,pr]of Object.entries(fw.principles)){
      const maxConn=Math.max(...Object.values(fw.principles).map(p=>p.connection_count),1);
      const pct=Math.round(pr.connection_count/maxConn*100);
      html+=`<div class="principle-item"><h4>${pr.name} <span style="color:var(--text-dim);font-weight:normal">(${pr.connection_count})</span></h4>
        <div class="desc">${escHtml(pr.description)}</div>
        <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div></div>`;
    }
    // Related insights
    const relIns=getRelatedInsights([fw.name,key]).slice(0,3);
    if(relIns.length){
      html+=`<h4 style="color:var(--accent);margin:12px 0 6px">Related Insights</h4>`;
      relIns.forEach(i=>{html+=`<div class="insight-callout"><h4>${escHtml(i.title)}</h4>${escHtml(truncate(i.content,200))}</div>`});
    }
    html+=`</div></div>`;
  }
  html+=`</div>`;
  
  // Overlap
  html+=`<div class="overlap-section"><h3>Framework Convergence</h3>`;
  overlapData.forEach(o=>{
    html+=`<div class="overlap-item"><div class="theme-name">${o.theme}</div><div class="overlap-pills">${o.frameworks.map(f=>`<span class="pill" style="background:var(--accent)22;color:var(--accent)">${f}</span>`).join('')}</div></div>`;
  });
  html+=`</div>`;
  
  panel.innerHTML=html;
  panel.querySelectorAll('.fw-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const wasExpanded=card.classList.contains('expanded');
      panel.querySelectorAll('.fw-card').forEach(c=>c.classList.remove('expanded'));
      if(!wasExpanded)card.classList.add('expanded');
    });
  });
}

// ===== JOURNAL TAB =====
function renderJournal(){
  const panel=document.getElementById('journal-panel');
  panel.innerHTML=`<div class="journal-left">
    <textarea id="journal-text" placeholder="Start writing..."></textarea>
    <button class="add-btn" id="save-reflection">Add to Library</button>
    <div class="saved-reflections" id="saved-reflections"></div>
  </div>
  <div class="journal-right" id="journal-connections">
    <h4>Detected Themes</h4><div id="j-themes"></div>
    <h4>Related Events</h4><div id="j-events"></div>
    <h4>Framework Suggestions</h4><div id="j-frameworks"></div>
    <h4>Related Insights</h4><div id="j-insights"></div>
  </div>`;
  
  let debounce;
  document.getElementById('journal-text').addEventListener('input',e=>{
    clearTimeout(debounce);
    debounce=setTimeout(()=>updateJournalConnections(e.target.value),300);
  });
  
  document.getElementById('save-reflection').addEventListener('click',()=>{
    const text=document.getElementById('journal-text').value.trim();
    if(!text)return;
    const reflections=JSON.parse(localStorage.getItem('life_explorer_reflections')||'[]');
    reflections.unshift({text,date:new Date().toISOString()});
    localStorage.setItem('life_explorer_reflections',JSON.stringify(reflections));
    document.getElementById('journal-text').value='';
    loadReflections();
  });
  
  loadReflections();
  
  function loadReflections(){
    const reflections=JSON.parse(localStorage.getItem('life_explorer_reflections')||'[]');
    const el=document.getElementById('saved-reflections');
    el.innerHTML=reflections.slice(0,10).map(r=>`<div class="saved-ref"><div class="ref-date">${new Date(r.date).toLocaleString()}</div><div class="ref-text">${escHtml(truncate(r.text,200))}</div></div>`).join('');
  }
  
  function updateJournalConnections(text){
    if(!text||text.length<3)return;
    const lower=text.toLowerCase();
    
    // Detect themes
    const detectedThemes=[];
    for(const[key,theme]of Object.entries(DATA.themes)){
      const words=[key,theme.label.toLowerCase(),...Object.keys(theme.subcategories).map(s=>s.replace(/_/g,' '))];
      if(words.some(w=>lower.includes(w)))detectedThemes.push({key,label:theme.label});
    }
    document.getElementById('j-themes').innerHTML=detectedThemes.map(t=>`<span class="pill" style="background:${THEME_COLORS[t.key]}33;color:${THEME_COLORS[t.key]}">${t.label}</span>`).join('')||'<span style="font-size:12px;color:var(--text-dim)">Keep writing...</span>';
    
    // Related events
    const matchEvents=DATA.events.filter(ev=>{
      const evText=(ev.summary+' '+(ev.key_quotes||[]).join(' ')).toLowerCase();
      const words=lower.split(/\s+/).filter(w=>w.length>3);
      return words.filter(w=>evText.includes(w)).length>=2;
    }).slice(0,5);
    document.getElementById('j-events').innerHTML=matchEvents.map(ev=>`<div style="padding:4px 0;font-size:12px;color:var(--text-dim)">${fmtDate(ev.date)} - ${escHtml(truncate(ev.filename,40))}</div>`).join('')||'<span style="font-size:12px;color:var(--text-dim)">No matches yet</span>';
    
    // Framework suggestions
    const fwMatches=[];
    for(const[fk,fw]of Object.entries(DATA.frameworks)){
      for(const[pk,pr]of Object.entries(fw.principles)){
        if(lower.includes(pr.name.toLowerCase().split(' ')[0])||lower.includes(pk.replace(/_/g,' '))){
          fwMatches.push(`${fw.name}: ${pr.name}`);
        }
      }
    }
    document.getElementById('j-frameworks').innerHTML=fwMatches.slice(0,5).map(f=>`<span class="pill">${f}</span>`).join('')||'<span style="font-size:12px;color:var(--text-dim)">No matches yet</span>';
    
    // Related insights
    const kws=detectedThemes.map(t=>t.key);
    const words=lower.split(/\s+/).filter(w=>w.length>4).slice(0,5);
    const relIns=getRelatedInsights([...kws,...words]).slice(0,4);
    document.getElementById('j-insights').innerHTML=relIns.map(i=>`<div class="insight-callout"><h4>${escHtml(i.title)}</h4>${escHtml(truncate(i.content,150))}</div>`).join('')||'<span style="font-size:12px;color:var(--text-dim)">Keep writing to discover connections...</span>';
  }
}

// Initialize first tab
initTab('discovery');
</script>
</body>
</html>
